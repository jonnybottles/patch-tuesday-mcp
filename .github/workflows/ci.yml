name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        # NB: do NOT install the telemetry extra here — test_telemetry_requires_
        # optional_package asserts setup fails when azure-monitor-opentelemetry
        # is absent, which is the documented dev/test contract.
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test (offline suite, coverage gate)
        run: pytest -q --cov=patch_tuesday_mcp --cov-fail-under=90

  container:
    name: Container build, scan, SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: docker build -t patch-tuesday-mcp:ci .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: patch-tuesday-mcp:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

      # Endpoint smoke: run the freshly built (and Trivy-scanned) image and
      # exercise the MCP protocol + middleware over real HTTP. Only
      # upstream-free tests run here so PR checks never depend on live
      # MSRC/EPSS/KEV availability; no secrets needed, so fork PRs are
      # covered too.
      - name: Run container for endpoint smoke
        run: docker run -d --name mcp-smoke -p 8000:8000 patch-tuesday-mcp:ci

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Wait for container health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "container did not become healthy" >&2
          exit 1

      - name: Endpoint smoke (MCP over HTTP, upstream-free)
        run: >-
          pytest -q -m "endpoint and not endpoint_upstream"
          --endpoint-url=http://localhost:8000 --endpoint-burst

      - name: Container logs
        if: failure()
        run: docker logs mcp-smoke

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: patch-tuesday-mcp:ci
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-sbom
          path: sbom.spdx.json
